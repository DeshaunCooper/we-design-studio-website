<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Checkout Cancelled — We Design Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#fafafa;color:#111;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
    .icon{width:64px;height:64px;background:#f3f4f6;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
    h1{font-size:32px;font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}
    p{font-size:15px;color:#6b7280;line-height:1.7;max-width:460px;margin:0 auto 28px}
    .btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    a.btn{display:inline-block;background:#111;color:#fff;padding:13px 28px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;transition:background .15s}
    a.btn:hover{background:#222}
    a.btn-ghost{background:transparent;color:#111;border:1.5px solid #e5e7eb}
    a.btn-ghost:hover{background:#f3f4f6}
    .email{font-size:13px;color:#9ca3af;margin-top:24px}
    .email a{color:#111;text-decoration:none}
  </style>
</head>
<body>
  <div class="icon">
    <svg width="28" height="28" fill="none" stroke="#9ca3af" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </div>
  <h1>Checkout cancelled.</h1>
  <p>No payment was taken. You can go back and try again, or reach out directly if you have questions about the right package for your business.</p>
  <div class="btn-row">
    <a href="index.html#pricing-section" class="btn">Back to Pricing</a>
    <a href="index.html#contact-section" class="btn btn-ghost">Contact Us Instead</a>
  </div>
  <div class="email"><a href="mailto:hello@wedesignsstudio.com">hello@wedesignsstudio.com</a></div>
</body>
</html>
